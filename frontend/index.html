<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quote Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Quote Genartor</h1>
        <div id="quote-box">
            <p id="quote">Click the button to generate a quote!</p>
            <p id="author"></p>
        </div>
        <div class="action-buttons">
            <button id="copy-btn" class="action-btn" title="Copy Quote">
                📋 Copy
            </button>
            <button id="like-btn" class="action-btn" title="Like Quote">
                ❤️ Like
            </button>
            <button id="twitter-btn" class="action-btn" title="Share on Twitter">
                🐦 Tweet
            </button>
        </div>
        <button id="generate-btn">GENERATE QUOTE</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
